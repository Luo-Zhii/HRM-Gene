version: "3.8"

services:
  # --- BỎ SERVICE DB ---

  # --- BACKEND (NestJS) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrm_backend
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    # QUAN TRỌNG: Thêm đoạn này để container nhìn thấy IP của máy chủ (Host)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Cấu hình kết nối DB
      # Sửa 'db' thành 'host.docker.internal' để trỏ về máy thật (nơi đang chạy container backend_db_1)
      - DB_HOST=host.docker.internal 
      - DB_PORT=5432
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_NAME}
      - PORT=3000
    # Bỏ depends_on vì không còn service db trong file này
    # depends_on:
    #   - db 
    networks:
      - hrm-network

  # --- FRONTEND (Next.js) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrm_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - INTERNAL_API_URL=http://backend:3000
    networks:
      - hrm-network

# Bỏ volumes pgdata vì data đang nằm ở container cũ
# volumes:
#   pgdata:

networks:
  hrm-network:
    driver: bridge